<!DOCTYPE html>
<html>
<head>
    <title>UFO Declassified Files</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --border: #2a2a3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --warning: #facc15;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

        header {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .logo span { color: var(--accent); }

        nav { display: flex; gap: 24px; }
        nav a { 
            color: var(--text-secondary); 
            text-decoration: none; 
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--text-primary); }

        main { padding: 48px 0; }

        .hero {
            text-align: center;
            margin-bottom: 48px;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-bottom: 40px;
        }

        .stat {
            text-align: center;
        }

        .stat .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            transition: border-color 0.3s;
        }

        .search-container:focus-within {
            border-color: var(--accent);
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            font-size: 1rem;
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
        }

        .search-input::placeholder { color: var(--text-secondary); }

        .search-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: var(--accent-hover);
        }

        .results-section { margin-top: 32px; }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .result-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.1);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-title a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .result-title a:hover { color: var(--accent); }

        .result-type {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .result-type.page { 
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent);
        }

        .result-type.image { 
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }

        .result-meta {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .result-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-preview {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            word-break: break-word;
        }

        .result-preview mark {
            background: #fbbf24;
            color: #1a1a24;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .result-actions {
            margin-top: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .empty-state p {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        footer {
            text-align: center;
            padding: 32px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 48px;
        }

        /* Image browser */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .image-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .image-card a:hover img {
            opacity: 0.8;
        }

        .image-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .img-container {
            position: relative;
        }

        .clickable-img {
            cursor: pointer;
        }

        .image-card .info {
            padding: 16px;
        }

        .image-card .info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .image-card .info a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">UFO<span>Files</span></div>
                <nav>
                    <a href="/">Search</a>
                    <a href="/images">Images</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            PURSUE Database • {{ doc_count or 0 }} documents indexed
        </div>
    </footer>
</body>
</html>
